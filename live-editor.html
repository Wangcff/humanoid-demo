<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>实时编辑预览</title>
  <style>
    :root {
      --bg: #eef2f7;
      --panel: #ffffff;
      --text: #172033;
      --muted: #64748b;
      --line: #cbd5e1;
      --active: #2563eb;
      --ok: #0f766e;
      --bad: #b91c1c;
      --shadow: 0 12px 28px rgba(15, 23, 42, 0.12);
      color-scheme: light;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", "PingFang SC", sans-serif;
      color: var(--text);
      background: var(--bg);
      overflow: hidden;
    }

    .app {
      display: grid;
      grid-template-rows: 54px 1fr;
      height: 100%;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.94);
      box-shadow: 0 2px 16px rgba(15, 23, 42, 0.07);
      z-index: 2;
    }

    .brand {
      font-weight: 700;
      white-space: nowrap;
      margin-right: 4px;
    }

    .file-pill {
      max-width: 34vw;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 5px 8px;
      color: var(--muted);
      background: #f8fafc;
      font-size: 13px;
    }

    button {
      appearance: none;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      min-height: 34px;
      padding: 0 12px;
      font: inherit;
      cursor: pointer;
    }

    button:hover { border-color: #94a3b8; }
    button.primary {
      border-color: var(--active);
      background: var(--active);
      color: #fff;
    }

    .status {
      margin-left: auto;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .status.ok { color: var(--ok); }
    .status.bad { color: var(--bad); }

    .workspace {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(320px, 46%) 8px minmax(360px, 1fr);
    }

    .editor-pane,
    .preview-pane {
      min-width: 0;
      min-height: 0;
      background: var(--panel);
    }

    .editor-pane {
      display: grid;
      grid-template-rows: 38px 1fr;
      border-right: 1px solid var(--line);
    }

    .pane-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 0 12px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
      background: #f8fafc;
    }

    textarea {
      width: 100%;
      height: 100%;
      resize: none;
      border: 0;
      outline: 0;
      padding: 16px;
      color: #dbeafe;
      background: #101827;
      font: 14px/1.55 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      tab-size: 2;
      white-space: pre;
      overflow: auto;
    }

    .resizer {
      cursor: col-resize;
      background: #dbe3ee;
      border-left: 1px solid #c8d1dc;
      border-right: 1px solid #c8d1dc;
    }

    .resizer:hover,
    .resizer.dragging { background: #9db4d3; }

    .preview-pane {
      display: grid;
      grid-template-rows: 38px 1fr;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: #fff;
    }

    @media (max-width: 900px) {
      body { overflow: auto; }
      .app { min-height: 100%; height: auto; }
      .workspace {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(420px, 52vh) 8px minmax(560px, 1fr);
      }
      .editor-pane { border-right: 0; border-bottom: 1px solid var(--line); }
      .resizer { cursor: row-resize; border: 0; border-top: 1px solid #c8d1dc; border-bottom: 1px solid #c8d1dc; }
      .file-pill { max-width: 28vw; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="toolbar">
      <div class="brand">实时编辑预览</div>
      <div class="file-pill" id="fileName">index.html</div>
      <button type="button" id="reloadButton">重新载入</button>
      <button type="button" id="saveButton" class="primary">保存</button>
      <div class="status" id="status">正在载入</div>
    </div>

    <div class="workspace" id="workspace">
      <section class="editor-pane">
        <div class="pane-head">
          <span>代码</span>
          <span id="charCount">0 字符</span>
        </div>
        <textarea id="code" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
      </section>
      <div class="resizer" id="resizer" aria-hidden="true"></div>
      <section class="preview-pane">
        <div class="pane-head">
          <span>预览</span>
          <a href="/" target="_blank" rel="noreferrer">打开页面</a>
        </div>
        <iframe id="preview" title="preview" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-presentation"></iframe>
      </section>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const targetPath = params.get('file') || 'index.html';
    const code = document.querySelector('#code');
    const preview = document.querySelector('#preview');
    const statusEl = document.querySelector('#status');
    const saveButton = document.querySelector('#saveButton');
    const reloadButton = document.querySelector('#reloadButton');
    const fileName = document.querySelector('#fileName');
    const charCount = document.querySelector('#charCount');
    const workspace = document.querySelector('#workspace');
    const resizer = document.querySelector('#resizer');
    let lastSaved = '';
    let updateTimer = 0;

    fileName.textContent = targetPath;

    function setStatus(text, state = '') {
      statusEl.textContent = text;
      statusEl.className = `status ${state}`.trim();
    }

    function previewDocument(source) {
      const base = '<base href="/">\n';
      if (source.includes('<head>')) return source.replace('<head>', `<head>\n${base}`);
      return base + source;
    }

    function updatePreview() {
      const source = code.value;
      preview.srcdoc = previewDocument(source);
      charCount.textContent = `${source.length} 字符`;
      if (source === lastSaved) setStatus('已保存', 'ok');
      else setStatus('未保存');
    }

    function schedulePreview() {
      clearTimeout(updateTimer);
      updateTimer = setTimeout(updatePreview, 180);
    }

    async function loadFile() {
      setStatus('正在载入');
      const response = await fetch(`/__file?path=${encodeURIComponent(targetPath)}`);
      const data = await response.json();
      if (!data.ok) throw new Error(data.error || '载入失败');
      code.value = data.content;
      lastSaved = data.content;
      updatePreview();
      setStatus('已载入', 'ok');
    }

    async function saveFile() {
      setStatus('正在保存');
      const response = await fetch(`/__save?path=${encodeURIComponent(targetPath)}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content: code.value })
      });
      const data = await response.json();
      if (!data.ok) throw new Error(data.error || '保存失败');
      lastSaved = code.value;
      updatePreview();
      setStatus('已保存', 'ok');
    }

    code.addEventListener('input', schedulePreview);
    code.addEventListener('keydown', event => {
      if (event.key === 'Tab') {
        event.preventDefault();
        const start = code.selectionStart;
        const end = code.selectionEnd;
        code.value = code.value.slice(0, start) + '  ' + code.value.slice(end);
        code.selectionStart = code.selectionEnd = start + 2;
        schedulePreview();
      }
      if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === 's') {
        event.preventDefault();
        saveFile().catch(error => setStatus(error.message, 'bad'));
      }
    });

    saveButton.addEventListener('click', () => saveFile().catch(error => setStatus(error.message, 'bad')));
    reloadButton.addEventListener('click', () => loadFile().catch(error => setStatus(error.message, 'bad')));

    let dragging = false;
    resizer.addEventListener('pointerdown', event => {
      dragging = true;
      resizer.classList.add('dragging');
      resizer.setPointerCapture(event.pointerId);
    });
    resizer.addEventListener('pointermove', event => {
      if (!dragging) return;
      const rect = workspace.getBoundingClientRect();
      if (matchMedia('(max-width: 900px)').matches) {
        const top = Math.min(Math.max(event.clientY - rect.top, 260), rect.height - 320);
        workspace.style.gridTemplateRows = `${top}px 8px minmax(420px, 1fr)`;
      } else {
        const left = Math.min(Math.max(event.clientX - rect.left, 320), rect.width - 360);
        workspace.style.gridTemplateColumns = `${left}px 8px minmax(360px, 1fr)`;
      }
    });
    resizer.addEventListener('pointerup', event => {
      dragging = false;
      resizer.classList.remove('dragging');
      resizer.releasePointerCapture(event.pointerId);
    });

    window.addEventListener('beforeunload', event => {
      if (code.value !== lastSaved) {
        event.preventDefault();
        event.returnValue = '';
      }
    });

    loadFile().catch(error => setStatus(error.message, 'bad'));
  </script>
</body>
</html>
